name: SocialMediaWidgetThing
options:
  bundleIdPrefix: com.socialmediawidget
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  SocialMediaWidgetThing:
    type: application
    platform: iOS
    sources:
      - path: SocialMediaWidgetThing
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.socialmediawidget.thing
        INFOPLIST_FILE: SocialMediaWidgetThing/Info.plist
        CODE_SIGN_ENTITLEMENTS: SocialMediaWidgetThing/SocialMediaWidgetThing.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - target: SocialWidgetExtension
        embed: true
      - target: ShareTrackerExtension
        embed: true
    preBuildScripts:
      - name: "Set Development Team"
        script: |
          if [ -z "$DEVELOPMENT_TEAM" ] && [ -n "${DEVELOPMENT_TEAM_ID:-}" ]; then
            /usr/libexec/PlistBuddy -c "Set :DEVELOPMENT_TEAM ${DEVELOPMENT_TEAM_ID}" "${TARGET_BUILD_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
          fi
        basedOnDependencyAnalysis: false

  SocialWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: SocialWidgetExtension
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.socialmediawidget.thing.widget
        INFOPLIST_FILE: SocialWidgetExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: SocialWidgetExtension/SocialWidgetExtension.entitlements
        SKIP_INSTALL: true
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false

  ShareTrackerExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareTrackerExtension
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.socialmediawidget.thing.share
        INFOPLIST_FILE: ShareTrackerExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShareTrackerExtension/ShareTrackerExtension.entitlements
        SKIP_INSTALL: true
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false

schemes:
  SocialMediaWidgetThing:
    build:
      targets:
        SocialMediaWidgetThing: all
    run:
      config: Debug
    archive:
      config: Release
